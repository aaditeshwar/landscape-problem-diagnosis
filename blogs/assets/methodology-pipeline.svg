<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 200" role="img" aria-label="Evidence card methodology pipeline">
  <defs>
    <style>
      .box { fill: #fef3c7; stroke: #b45309; stroke-width: 1.5; rx: 8; }
      .arrow { stroke: #78716c; stroke-width: 2; fill: none; marker-end: url(#m); }
      .t { font: 12px sans-serif; fill: #1c1917; }
      .h { font: bold 13px sans-serif; fill: #78350f; }
    </style>
    <marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#78716c"/>
    </marker>
  </defs>
  <rect class="box" x="10" y="50" width="100" height="56"/>
  <text class="h" x="60" y="72" text-anchor="middle">Production</text>
  <text class="h" x="60" y="88" text-anchor="middle">systems</text>
  <path class="arrow" d="M110 78 H130"/>
  <rect class="box" x="130" y="50" width="100" height="56"/>
  <text class="h" x="180" y="72" text-anchor="middle">Paper</text>
  <text class="h" x="180" y="88" text-anchor="middle">retrieval</text>
  <path class="arrow" d="M230 78 H250"/>
  <rect class="box" x="250" y="50" width="100" height="56"/>
  <text class="h" x="300" y="72" text-anchor="middle">Curate</text>
  <text class="h" x="300" y="88" text-anchor="middle">papers</text>
  <path class="arrow" d="M350 78 H370"/>
  <rect class="box" x="370" y="42" width="110" height="72"/>
  <text class="h" x="425" y="64" text-anchor="middle">Data</text>
  <text class="h" x="425" y="80" text-anchor="middle">dictionary</text>
  <text class="t" x="425" y="98" text-anchor="middle">(MWS vars)</text>
  <path class="arrow" d="M480 78 H500"/>
  <rect class="box" x="500" y="42" width="110" height="72"/>
  <text class="h" x="555" y="64" text-anchor="middle">Evidence</text>
  <text class="h" x="555" y="80" text-anchor="middle">cards</text>
  <text class="t" x="555" y="98" text-anchor="middle">(Claude draft)</text>
  <path class="arrow" d="M610 78 H630"/>
  <rect class="box" x="630" y="30" width="120" height="96"/>
  <text class="h" x="690" y="52" text-anchor="middle">Normalize</text>
  <text class="t" x="690" y="70" text-anchor="middle">variables ·</text>
  <text class="t" x="690" y="86" text-anchor="middle">expressions ·</text>
  <text class="t" x="690" y="102" text-anchor="middle">policy ” prose</text>
  <path class="arrow" d="M750 78 H770"/>
  <rect class="box" x="770" y="50" width="100" height="56"/>
  <text class="h" x="820" y="72" text-anchor="middle">Fine-tune</text>
  <text class="h" x="820" y="88" text-anchor="middle">(optional)</text>
  <text class="t" x="460" y="165" text-anchor="middle" font-size="11" fill="#57534e">Human review loops: revise-cards · triaging · query evaluation</text>
</svg>
