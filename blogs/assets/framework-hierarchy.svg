<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" role="img" aria-label="Production system to causal pathway framework">
  <defs>
    <style>
      .ps { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 1.5; }
      .stress { fill: #e0e7ff; stroke: #4338ca; stroke-width: 1.2; }
      .path { fill: #fef3c7; stroke: #b45309; stroke-width: 1.2; }
      .built { fill: #bbf7d0; stroke: #15803d; stroke-width: 2; }
      .t { font: 11px sans-serif; fill: #1c1917; }
      .h { font: bold 12px sans-serif; fill: #1e3a8a; }
      .line { stroke: #94a3b8; stroke-width: 1.5; fill: none; }
    </style>
  </defs>
  <text class="h" x="360" y="24" text-anchor="middle">Diagnosis framework (built pathways highlighted)</text>
  <!-- Agriculture -->
  <rect class="ps" x="20" y="40" width="200" height="36" rx="6"/>
  <text class="h" x="120" y="63" text-anchor="middle">Agriculture</text>
  <rect class="stress" x="240" y="40" width="160" height="36" rx="6"/>
  <text class="t" x="320" y="63" text-anchor="middle">water_scarcity</text>
  <line class="line" x1="400" y1="58" x2="430" y2="58"/>
  <rect class="built" x="430" y="34" width="130" height="28" rx="5"/>
  <text class="t" x="495" y="52" text-anchor="middle">drought </text>
  <rect class="built" x="430" y="66" width="130" height="28" rx="5"/>
  <text class="t" x="495" y="84" text-anchor="middle">groundwater_stress </text>
  <rect class="built" x="570" y="34" width="130" height="28" rx="5"/>
  <text class="t" x="635" y="52" text-anchor="middle">rainfed_risk </text>
  <rect class="built" x="570" y="66" width="130" height="28" rx="5"/>
  <text class="t" x="635" y="84" text-anchor="middle">irrigation_challenges </text>
  <!-- NTFP -->
  <rect class="ps" x="20" y="120" width="200" height="36" rx="6"/>
  <text class="h" x="120" y="143" text-anchor="middle">NTFP / Forest biodiversity</text>
  <rect class="stress" x="240" y="110" width="160" height="28" rx="6"/>
  <text class="t" x="320" y="128" text-anchor="middle">ntfp_decline</text>
  <rect class="built" x="430" y="104" width="130" height="28" rx="5"/>
  <text class="t" x="495" y="122" text-anchor="middle">forest_degradation </text>
  <rect class="stress" x="240" y="144" width="160" height="28" rx="6"/>
  <text class="t" x="320" y="162" text-anchor="middle">biodiversity_loss</text>
  <rect class="built" x="430" y="138" width="130" height="28" rx="5"/>
  <text class="t" x="495" y="156" text-anchor="middle">encroachment </text>
  <!-- Socio-economic -->
  <rect class="ps" x="20" y="200" width="200" height="36" rx="6"/>
  <text class="h" x="120" y="223" text-anchor="middle">Socio-economic</text>
  <rect class="stress" x="240" y="190" width="160" height="28" rx="6"/>
  <text class="t" x="320" y="208" text-anchor="middle">economic_hardship</text>
  <rect class="built" x="430" y="184" width="180" height="28" rx="5"/>
  <text class="t" x="520" y="202" text-anchor="middle">multi_sector_vulnerability </text>
  <rect class="stress" x="240" y="224" width="160" height="28" rx="6"/>
  <text class="t" x="320" y="242" text-anchor="middle">low_income</text>
  <rect class="built" x="430" y="218" width="130" height="28" rx="5"/>
  <text class="t" x="495" y="236" text-anchor="middle">small_landholding </text>
  <!-- Livestock etc placeholder -->
  <rect class="ps" x="20" y="280" width="200" height="36" rx="6" opacity="0.5"/>
  <text class="t" x="120" y="303" text-anchor="middle">Livestock · Forestry · & (framework slots)</text>
  <text class="t" x="360" y="325" text-anchor="middle" fill="#57534e"> = evidence cards + signal expressions built (8 pathways today)</text>
</svg>
